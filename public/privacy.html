<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — Stillform</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0A0A0C;
      --surface: #141418;
      --amber: #C8922A;
      --amber-dim: rgba(200,146,42,0.2);
      --text: #E8EAF0;
      --text-dim: #9496A1;
      --text-muted: #55575F;
      --border: rgba(255,255,255,0.07);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 0.5px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--amber); }
    .nav-back {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
    }
    .nav-back:hover { color: var(--amber); }
    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 300;
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .subtitle {
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .policy-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 3px;
      border: 0.5px solid var(--amber-dim);
      background: var(--surface);
      color: var(--amber);
      text-decoration: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .policy-link:hover {
      background: rgba(200,146,42,0.08);
    }
    .policy-frame {
      width: 100%;
      min-height: calc(100vh - 260px);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      display: block;
    }
    .noscript-fallback {
      color: var(--text-dim);
      margin-top: 14px;
    }
    .noscript-fallback a {
      color: var(--amber);
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">Still<span>form</span></a>
    <a class="nav-back" href="/">← Back to app</a>
  </nav>

  <main class="page">
    <h1>Privacy Policy</h1>
    <p class="subtitle">Official Termly policy embedded below.</p>
    <div class="actions">
      <a class="policy-link" href="https://app.termly.io/policy-viewer/policy.html?policyUUID=b96f179b-d3e1-4bdb-acc8-6b656ffe0280" target="_blank" rel="noopener noreferrer">
        Open in new tab →
      </a>
    </div>
    <iframe
      class="policy-frame"
      title="Stillform Privacy Policy"
      src="https://app.termly.io/policy-viewer/policy.html?policyUUID=b96f179b-d3e1-4bdb-acc8-6b656ffe0280"
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin">
    </iframe>
    <noscript>
      <p class="noscript-fallback">
        JavaScript is required to view the embedded policy. Open it directly:
        <a href="https://app.termly.io/policy-viewer/policy.html?policyUUID=b96f179b-d3e1-4bdb-acc8-6b656ffe0280" target="_blank" rel="noopener noreferrer">Termly Privacy Policy</a>.
      </p>
    </noscript>
  </main>
</body>
</html>
