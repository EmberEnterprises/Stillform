[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."reframe"]
  timeout = 26

[[redirects]]
  from = "/favicon.ico"
  to = "/icon-192.png"
  status = 200

# Bootstrap files should always come fresh to avoid stale PWA startup loops.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"
