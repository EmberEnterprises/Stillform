    <title>Stillform — Composure Mastery</title>
    <meta name="description" content="Stillform — master the pause between feeling and action. Composure when you need it, in under two minutes. AI-powered. Fast. Repeatable." />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" id="favicon" />
    <link rel="shortcut icon" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <script>
      // Breathing favicon — the S exhales
      (function() {
        var canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        var ctx = canvas.getContext('2d');
        var favicon = document.getElementById('favicon');
        if (!ctx || !favicon) return;

        var frame = 0;
        var totalFrames = 120; // ~4s at 30fps
        var interval = 1000 / 30;

        function draw() {
          var t = frame / totalFrames;
          // Sine wave: 0→1→0 over the cycle
          // First half = exhale (shrink + fade), second half = inhale (grow + restore)
          var breath = Math.sin(t * Math.PI * 2);
          // Scale: 1.0 at peak, 0.85 at trough
          var scale = 1.0 - (breath * 0.075);
          // Opacity: 1.0 at peak, 0.6 at trough
          var opacity = 1.0 - (breath * 0.2);

          ctx.clearRect(0, 0, 64, 64);

          // Background circle
          ctx.fillStyle = '#0A0A0C';
          ctx.fillRect(0, 0, 64, 64);

          ctx.save();
          ctx.translate(32, 32);
          ctx.scale(scale, scale);

          // Outer ring
          ctx.beginPath();
          ctx.arc(0, 0, 28, 0, Math.PI * 2);
          ctx.fillStyle = '#1A1A1F';
          ctx.fill();

          // Inner circle
          ctx.beginPath();
          ctx.arc(0, 0, 25, 0, Math.PI * 2);
          ctx.fillStyle = '#141418';
          ctx.fill();

          // The S
          ctx.globalAlpha = opacity;
          ctx.font = "600 32px 'Georgia', serif";
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#C8922A';
          ctx.fillText('S', 0, 1);
          ctx.globalAlpha = 1;

          ctx.restore();

          favicon.href = canvas.toDataURL('image/png');
          frame = (frame + 1) % totalFrames;
        }

        // Only run on desktop browsers that support it
        if (window.innerWidth > 768 && !navigator.userAgent.match(/Safari/) || navigator.userAgent.match(/Chrome/)) {
          // Start after page loads to not block rendering
          window.addEventListener('load', function() {
            setInterval(draw, interval);
          });
        }
      })();
    </script>

        var bootTimeout = setTimeout(function() {
          if (document.getElementById('root') && document.getElementById('root').children.length === 0) {

            fallback.style.background = '#0A0A0C';
            fallback.style.color = '#E8EAF0';
            fallback.style.fontFamily = "'DM Sans', sans-serif";
            fallback.innerHTML = "<div style='font-size:28px;font-family:\"Cormorant Garamond\",serif;font-weight:300;color:#C8922A;margin-bottom:10px'>Stillform</div><div style='font-size:14px;color:#9496A1;line-height:1.6;margin-bottom:16px'>Startup took longer than expected. Your data is safe.</div><button id='stillform-reload-btn' style='background:#C8922A;color:#0A0A0C;border:none;border-radius:4px;padding:12px 18px;font-size:14px;cursor:pointer'>Reload app</button>";
            document.body.innerHTML = '';
            document.body.appendChild(fallback);
            var btn = document.getElementById('stillform-reload-btn');
            if (btn) btn.onclick = function() { window.location.replace('/?refresh=1&ts=' + Date.now()); };
          }
        }, 12000);
        window.addEventListener('load', function() {
          clearTimeout(bootTimeout);
        });
      })();

      // Capture PWA install prompt BEFORE React loads
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        window.__pwaInstallPrompt = e;
      });

      // Reliability-first hotfix:
      // aggressively remove legacy service workers/caches that can strand users on
      // stale asset manifests and cause blank screen starts after deploys.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            registration.unregister();
          });
        }).catch(function() {});
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) {
            caches.delete(name);
          });
        }).catch(function() {});
      }
