name: Security Gate

on:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Boot smoke (blank-screen guard)
        run: |
          npm i --no-save puppeteer-core
          node scripts/boot-smoke.mjs

      - name: Security smoke checks
        run: npm run security:smoke
